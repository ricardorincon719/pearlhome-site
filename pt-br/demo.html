<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PEARL HOME Demo</title>
  <link rel="canonical" href="../demo.html" />
  <link rel="alternate" hreflang="pt-BR" href="../demo.html" />
  <link rel="alternate" hreflang="es" href="../es/demo.html" />
  <link rel="stylesheet" href="../css/demo.css" />
</head>
<body class="scene-relax">
  <main class="demo-shell">
    <header class="demo-header">
      <a class="brand" href="../" aria-label="Voltar para PEARL HOME">
        <span class="brand-mark"></span>
        <span>
          <strong>PEARL HOME</strong>
          <small>INTERFACE AO VIVO</small>
        </span>
      </a>

      <div class="demo-actions">
        <nav class="language-switch" aria-label="Idioma">
          <a class="active" href="../demo.html" aria-current="page">PT-BR</a>
          <a href="../es/demo.html">ES</a>
        </nav>
        <div class="system-status">
          <span class="pulse"></span>
          <span id="systemStatus">Online</span>
        </div>
      </div>
    </header>

    <section class="experience">
      <div class="room-stage" aria-label="Simulação visual do PEARL HOME">
        <div class="ambient-glow"></div>
        <div class="light-orb" id="lightOrb"></div>
        <div class="room-lines">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="room-info">
          <span>Cena ativa</span>
          <strong id="activeSceneLabel">Relax</strong>
        </div>
      </div>

      <section class="control-grid" aria-label="Controles do PEARL HOME">
        <article class="panel light-panel">
          <div class="panel-head">
            <div>
              <span>Luz</span>
              <h1>Painel Principal</h1>
            </div>
            <button class="power active" id="powerButton" type="button" aria-pressed="true">
              ON
            </button>
          </div>

          <label class="range-control" for="brightnessSlider">
            <span>Brilho</span>
            <strong id="brightnessValue">78%</strong>
          </label>
          <input id="brightnessSlider" type="range" min="5" max="100" value="78" />

          <div class="temperature">
            <span>Temperatura</span>
            <div class="segmented" role="group" aria-label="Temperatura da luz">
              <button class="active" type="button" data-temperature="warm">Quente</button>
              <button type="button" data-temperature="neutral">Neutro</button>
              <button type="button" data-temperature="cool">Frio</button>
            </div>
          </div>

          <div class="swatches" aria-label="Cores da luz">
            <button class="swatch active" type="button" data-color="#5ce1ff" style="--swatch: #5ce1ff" aria-label="Ciano"></button>
            <button class="swatch" type="button" data-color="#8dffb8" style="--swatch: #8dffb8" aria-label="Verde"></button>
            <button class="swatch" type="button" data-color="#ffd36a" style="--swatch: #ffd36a" aria-label="Âmbar"></button>
            <button class="swatch" type="button" data-color="#ff6ad5" style="--swatch: #ff6ad5" aria-label="Rosa"></button>
            <button class="swatch" type="button" data-color="#9f7cff" style="--swatch: #9f7cff" aria-label="Violeta"></button>
          </div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <div>
              <span>Cenas</span>
              <h2>Ambientes</h2>
            </div>
          </div>

          <div class="scene-list">
            <button class="scene-button active" type="button" data-scene="relax">Relax</button>
            <button class="scene-button" type="button" data-scene="reading">Leitura</button>
            <button class="scene-button" type="button" data-scene="night">Noite</button>
            <button class="scene-button" type="button" data-scene="energy">Energia</button>
          </div>
        </article>

        <article class="panel music-panel">
          <div class="panel-head">
            <div>
              <span>Música</span>
              <h2>Motor de Música</h2>
            </div>
            <span class="track-state" id="trackState">Pronto</span>
          </div>

          <input class="music-search" id="musicSearch" type="search" placeholder="Buscar música..." />

          <div class="quick-music">
            <button type="button" data-track="Lofi">Lofi</button>
            <button type="button" data-track="Jazz">Jazz</button>
            <button type="button" data-track="Relax">Relax</button>
            <button type="button" data-track="Synthwave">Synthwave</button>
          </div>

          <div class="equalizer" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
        </article>

        <article class="panel console-panel">
          <div class="panel-head">
            <div>
              <span>Console</span>
              <h2>Comando Jarvis</h2>
            </div>
          </div>

          <div class="terminal" id="terminal" aria-live="polite">
            <p><span>&gt;</span> Sistema PEARL iniciado</p>
            <p class="ok">✓ Interface pronta</p>
            <p><span>&gt;</span> Acender luz</p>
            <p class="ok">✓ Luz acesa</p>
            <p><span>&gt;</span> Ativar cena relax</p>
            <p class="ok">✓ Cena relax aplicada</p>
          </div>

          <form class="command-row" id="commandForm">
            <input id="commandInput" type="text" placeholder="Escrever comando..." autocomplete="off" />
            <button type="submit">Enviar</button>
          </form>
        </article>
      </section>
    </section>
  </main>

  <script src="../js/demo.js"></script>
</body>
</html>
