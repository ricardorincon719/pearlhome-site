<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PEARL HOME Demo</title>
  <link rel="alternate" hreflang="pt-BR" href="../demo.html" />
  <link rel="alternate" hreflang="es" href="./demo.html" />
  <link rel="stylesheet" href="../css/demo.css" />
</head>
<body class="scene-relax">
  <main class="demo-shell">
    <header class="demo-header">
      <a class="brand" href="./" aria-label="Volver a PEARL HOME">
        <span class="brand-mark"></span>
        <span>
          <strong>PEARL HOME</strong>
          <small>LIVE INTERFACE</small>
        </span>
      </a>

      <div class="demo-actions">
        <nav class="language-switch" aria-label="Idioma">
          <a href="../demo.html">PT-BR</a>
          <a class="active" href="./demo.html" aria-current="page">ES</a>
        </nav>
        <div class="system-status">
          <span class="pulse"></span>
          <span id="systemStatus">Online</span>
        </div>
      </div>
    </header>

    <section class="experience">
      <div class="room-stage" aria-label="Simulación visual de PEARL HOME">
        <div class="ambient-glow"></div>
        <div class="light-orb" id="lightOrb"></div>
        <div class="room-lines">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="room-info">
          <span>Escena activa</span>
          <strong id="activeSceneLabel">Relax</strong>
        </div>
      </div>

      <section class="control-grid" aria-label="Controles de PEARL HOME">
        <article class="panel light-panel">
          <div class="panel-head">
            <div>
              <span>Luz</span>
              <h1>Panel principal</h1>
            </div>
            <button class="power active" id="powerButton" type="button" aria-pressed="true">
              ON
            </button>
          </div>

          <label class="range-control" for="brightnessSlider">
            <span>Brillo</span>
            <strong id="brightnessValue">78%</strong>
          </label>
          <input id="brightnessSlider" type="range" min="5" max="100" value="78" />

          <div class="temperature">
            <span>Temperatura</span>
            <div class="segmented" role="group" aria-label="Temperatura de luz">
              <button class="active" type="button" data-temperature="warm">Cálido</button>
              <button type="button" data-temperature="neutral">Neutro</button>
              <button type="button" data-temperature="cool">Frio</button>
            </div>
          </div>

          <div class="swatches" aria-label="Colores de luz">
            <button class="swatch active" type="button" data-color="#5ce1ff" style="--swatch: #5ce1ff" aria-label="Cian"></button>
            <button class="swatch" type="button" data-color="#8dffb8" style="--swatch: #8dffb8" aria-label="Verde"></button>
            <button class="swatch" type="button" data-color="#ffd36a" style="--swatch: #ffd36a" aria-label="Ambar"></button>
            <button class="swatch" type="button" data-color="#ff6ad5" style="--swatch: #ff6ad5" aria-label="Rosa"></button>
            <button class="swatch" type="button" data-color="#9f7cff" style="--swatch: #9f7cff" aria-label="Violeta"></button>
          </div>
        </article>

        <article class="panel">
          <div class="panel-head">
            <div>
              <span>Escenas</span>
              <h2>Ambientes</h2>
            </div>
          </div>

          <div class="scene-list">
            <button class="scene-button active" type="button" data-scene="relax">Relax</button>
            <button class="scene-button" type="button" data-scene="reading">Lectura</button>
            <button class="scene-button" type="button" data-scene="night">Noche</button>
            <button class="scene-button" type="button" data-scene="energy">Energía</button>
          </div>
        </article>

        <article class="panel music-panel">
          <div class="panel-head">
            <div>
              <span>Música</span>
              <h2>Music Engine</h2>
            </div>
            <span class="track-state" id="trackState">Idle</span>
          </div>

          <input class="music-search" id="musicSearch" type="search" placeholder="Buscar música..." />

          <div class="quick-music">
            <button type="button" data-track="Lofi">Lofi</button>
            <button type="button" data-track="Jazz">Jazz</button>
            <button type="button" data-track="Relax">Relax</button>
            <button type="button" data-track="Synthwave">Synthwave</button>
          </div>

          <div class="equalizer" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
          </div>
        </article>

        <article class="panel console-panel">
          <div class="panel-head">
            <div>
              <span>Consola</span>
              <h2>Jarvis Command</h2>
            </div>
          </div>

          <div class="terminal" id="terminal" aria-live="polite">
            <p><span>&gt;</span> Sistema PEARL iniciado</p>
            <p class="ok">✓ Interfaz lista</p>
            <p><span>&gt;</span> Encender luz</p>
            <p class="ok">✓ Luz encendida</p>
            <p><span>&gt;</span> Activar escena relax</p>
            <p class="ok">✓ Escena relax aplicada</p>
          </div>

          <form class="command-row" id="commandForm">
            <input id="commandInput" type="text" placeholder="Escribir comando..." autocomplete="off" />
            <button type="submit">Enviar</button>
          </form>
        </article>
      </section>
    </section>
  </main>

  <script src="../js/demo.js"></script>
</body>
</html>
